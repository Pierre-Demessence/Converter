<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔄</text></svg>" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Convert images, audio, video and documents entirely in your browser. No server, no uploads — 100% private." />
  <title>Converter — Browser-Based File Conversion</title>
</head>

<body>
  <script>
    // Apply stored theme before first paint to prevent FOUC
    (function () {
      var t = localStorage.getItem('converter-theme') || 'system';
      var r = t === 'system' ? window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light' : t;
      document.documentElement.setAttribute('data-theme', r)
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
